apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: k8s-tp-app-prod
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/MartinPAVY/k8s-gitops-tp.git
    targetRevision: main
    path: k8s/overlays/prod
  destination:
    server: https://kubernetes.default.svc
    namespace: prod
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
